<svg viewBox="0 0 900 265" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#18182a"/>
    </linearGradient>
    <linearGradient id="bodyTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8002D"/>
      <stop offset="100%" stop-color="#9a0018"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8002D"/>
      <stop offset="100%" stop-color="#b50020"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#E8002D" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="265" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="53"  x2="900" y2="53"/>
    <line x1="0" y1="106" x2="900" y2="106"/>
    <line x1="0" y1="159" x2="900" y2="159"/>
    <line x1="0" y1="212" x2="900" y2="212"/>
    <line x1="225" y1="0"  x2="225" y2="265"/>
    <line x1="450" y1="0"  x2="450" y2="265"/>
    <line x1="675" y1="0"  x2="675" y2="265"/>
  </g>

  <!-- Speed / motion lines -->
  <g stroke="#E8002D" stroke-linecap="round">
    <line x1="0" y1="158" x2="148" y2="158" stroke-width="1"   opacity="0.20"/>
    <line x1="0" y1="170" x2="95"  y2="170" stroke-width="1.5" opacity="0.14"/>
    <line x1="0" y1="182" x2="172" y2="182" stroke-width="2.5" opacity="0.32"/>
    <line x1="0" y1="194" x2="82"  y2="194" stroke-width="1"   opacity="0.12"/>
    <line x1="0" y1="206" x2="130" y2="206" stroke-width="1.5" opacity="0.18"/>
    <line x1="0" y1="218" x2="68"  y2="218" stroke-width="1"   opacity="0.10"/>
  </g>

  <!-- Left vertical accent bar -->
  <rect x="34" y="54" width="5" height="134" fill="#E8002D" rx="2"/>

  <!-- Main title -->
  <text x="54" y="98"  font-size="40" font-weight="bold" fill="#FFFFFF" letter-spacing="-1" opacity="0.97">F1 Race Winner</text>
  <text x="54" y="143" font-size="40" font-weight="bold" fill="#FFFFFF" letter-spacing="-1" opacity="0.97">Prediction</text>

  <!-- Divider dot -->
  <circle cx="54" cy="160" r="2.5" fill="#E8002D"/>

  <!-- Subtitle -->
  <text x="68" y="165" font-size="12" fill="#888888" letter-spacing="2">LOGISTIC REGRESSION · XGBOOST ENSEMBLE</text>

  <!-- Meta line -->
  <text x="54" y="188" font-size="11" fill="#464646">Training: 2010 – 2026  ·  Jolpica API  ·  FastF1  ·  Open-Meteo  ·  NewsAPI</text>

  <!-- ═══════════════════════════════════════════ -->
  <!--              F1 CAR  (nose → right)         -->
  <!--  Ground: y=238   Wheel radius: 25           -->
  <!--  Front wheel cx=570  Rear wheel cx=795       -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Ground shadow -->
  <ellipse cx="675" cy="248" rx="198" ry="7" fill="#000000" opacity="0.6"/>

  <!-- ── REAR WING ── -->
  <!-- Endplates -->
  <rect x="848" y="168" width="11" height="48" fill="#CC001E" rx="1"/>
  <rect x="803" y="168" width="11" height="48" fill="#CC001E" rx="1"/>
  <!-- Wing planes -->
  <rect x="803" y="168" width="56" height="9"  fill="#E8002D" rx="2"/>
  <rect x="805" y="180" width="52" height="6"  fill="#AA001A" rx="1"/>
  <rect x="807" y="189" width="48" height="4"  fill="#880014" rx="1"/>
  <!-- Pylon -->
  <rect x="821" y="205" width="8"  height="16" fill="#880014"/>

  <!-- ── MAIN BODY ── -->
  <!-- Body silhouette — top profile + floor -->
  <path filter="url(#shadow)" d="
    M 497,220
    C 507,214 521,210 537,207
    L 562,203
    L 584,200
    C 596,199 604,193 616,188
    C 624,184 634,181 645,181
    C 656,181 665,184 672,189
    L 689,196
    L 715,199
    L 748,202
    L 780,205
    L 810,208
    L 830,212
    L 830,222
    L 497,222
    Z
  " fill="url(#bodyTop)"/>

  <!-- Cockpit pod highlight -->
  <path d="
    M 612,197
    C 620,190 631,185 643,184
    C 655,183 665,187 672,193
    L 662,199
    L 643,201
    L 623,201
    Z
  " fill="#E8002D" opacity="0.7"/>

  <!-- Halo (characteristic F1 safety device) -->
  <path d="M 619,196 Q 644,181 669,196"
        fill="none" stroke="#FF3355" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Sidepod inlet (dark oval) -->
  <ellipse cx="598" cy="206" rx="9" ry="6" fill="#0a0a12" opacity="0.75"/>

  <!-- Engine cover lower trim -->
  <rect x="680" y="211" width="150" height="4" fill="#770010" rx="1" opacity="0.6"/>

  <!-- Nose cone -->
  <path d="M 497,222 L 525,210 L 525,219 Z" fill="#7a000e"/>

  <!-- ── FRONT WING ── -->
  <!-- Endplates -->
  <rect x="489" y="222" width="6"  height="20" fill="#CC001E" rx="1"/>
  <rect x="528" y="218" width="6"  height="20" fill="#CC001E" rx="1"/>
  <!-- Wing planes (three-element) -->
  <path d="M 490,223 L 533,219 L 533,227 L 490,231 Z" fill="#E8002D"/>
  <path d="M 490,231 L 533,227 L 533,234 L 490,238 Z" fill="#BB0018"/>
  <path d="M 490,238 L 533,234 L 533,240 L 490,242 Z" fill="#920013"/>

  <!-- ── FLOOR / DIFFUSER ── -->
  <rect x="497" y="218" width="335" height="5" fill="#660010" rx="1"/>

  <!-- ── WHEELS ── -->
  <!-- Front wheel -->
  <circle cx="570" cy="213" r="27" fill="#181818"/>
  <circle cx="570" cy="213" r="22" fill="#111111" stroke="#262626" stroke-width="2.5"/>
  <circle cx="570" cy="213" r="14" fill="#161616" stroke="#2e2e2e" stroke-width="1.5"/>
  <circle cx="570" cy="213" r="5"  fill="#222222"/>
  <!-- Rim accent (red hub centre) -->
  <circle cx="570" cy="213" r="10" fill="none" stroke="#CC001E" stroke-width="2" opacity="0.55"/>
  <!-- Tyre highlight arc -->
  <path d="M 570,186 A 27,27 0 0,1 597,226"
        fill="none" stroke="#2e2e2e" stroke-width="3" opacity="0.65"/>

  <!-- Rear wheel (wider) -->
  <circle cx="795" cy="213" r="29" fill="#181818"/>
  <circle cx="795" cy="213" r="24" fill="#111111" stroke="#262626" stroke-width="2.5"/>
  <circle cx="795" cy="213" r="15" fill="#161616" stroke="#2e2e2e" stroke-width="1.5"/>
  <circle cx="795" cy="213" r="5"  fill="#222222"/>
  <!-- Rim accent -->
  <circle cx="795" cy="213" r="11" fill="none" stroke="#CC001E" stroke-width="2" opacity="0.55"/>
  <!-- Tyre highlight arc -->
  <path d="M 795,184 A 29,29 0 0,1 824,227"
        fill="none" stroke="#2e2e2e" stroke-width="3" opacity="0.65"/>

  <!-- ── BOTTOM RED BAR ── -->
  <rect x="0" y="256" width="900" height="9" fill="#E8002D"/>
</svg>
